spring:
  application:
    name: webhook-handler
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:h2:mem:reviewdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      # Задаётся через переменную окружения OPENAI_API_KEY в runtime
      # или через application-local.yml (локальный профиль).
      # placeholder 'dummy' позволяет приложению стартовать без реального ключа.
      api-key: ${OPENAI_API_KEY:dummy}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.3
        # Путь к endpoint completions — может отличаться у не-OpenAI провайдеров.
        # Переопределяется в application-local.yml или через переменную окружения.
        completions-path: ${OPENAI_COMPLETIONS_PATH:/v1/chat/completions}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

app:
  gitlab:
    url: ${GITLAB_URL:http://localhost}
    token: ${GITLAB_TOKEN:changeme}
    webhook-token: ${GITLAB_WEBHOOK_TOKEN:changeme}
  review:
    trigger-command: ${REVIEW_TRIGGER_COMMAND:review}
    mr-rag-url: ${MR_RAG_URL:http://localhost:8081}
  ai:
    system-prompt: |
      You are an experienced Java developer and code reviewer.
      Analyze only the provided context and diff summary.
      Reply concisely and in structured markdown format.
      Use the following sections:
      - What was found
      - Why it matters
      - What to fix
      If there are no issues, state that explicitly.
