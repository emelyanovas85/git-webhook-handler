spring:
  application:
    name: webhook-handler

server:
  port: 8080

webhook:
  gitlab:
    # GitLab sends token in X-Gitlab-Token header (plain text)
    # Set via env: WEBHOOK_GITLAB_SECRET_TOKEN=mysecret
    secret-token: ${WEBHOOK_GITLAB_SECRET_TOKEN:}
  github:
    # GitHub signs payload with HMAC-SHA256, sent in X-Hub-Signature-256 header
    # Set via env: WEBHOOK_GITHUB_SECRET_TOKEN=mysecret
    secret-token: ${WEBHOOK_GITHUB_SECRET_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.gitlabwebhookhandler: DEBUG
